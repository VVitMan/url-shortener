name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # ช่วยจำแคชไว้ ทำให้รันรอบต่อไปเร็วขึ้น
      # TODO: Add step to setup Node.js (version 18)

      - name: Install dependencies
        run: npm ci
      # TODO: Add step to install dependencies

      - name: Run tests
        run: npm test
      # TODO: Add step to run tests

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
      # TODO: Add step to login to Docker Hub
      # Hint: You need to set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repository secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract student ID and generate build time
        id: metadata
        run: |
          STUDENT_ID=$(cat student_id.txt)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "student_id=$STUDENT_ID" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Student ID: $STUDENT_ID"
          echo "Build Time: $BUILD_TIME"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest
          build-args: |
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
